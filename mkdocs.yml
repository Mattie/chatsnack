site_name: chatsnack
site_description: Authored guides, examples, and API reference for chatsnack.
site_url: https://mattie.github.io/chatsnack/
repo_url: https://github.com/Mattie/chatsnack
repo_name: Mattie/chatsnack
edit_uri: edit/master/docs/
docs_dir: docs
site_dir: site
strict: true
exclude_docs: |
  projects/
  rfcs/
  reference/datafiles.md

theme:
  name: material
  features:
    - content.code.copy
    - content.action.edit
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - scheme: default
      primary: teal
      accent: amber

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            inherited_members: true
            members_order: source
            merge_init_into_class: true
            show_root_heading: true
            show_root_toc_entry: false
            show_signature_annotations: true
            show_source: false
            filters:
              - "!^_"

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/extra.css

watch:
  - README.md
  - PHILOSOPHY.md
  - chatsnack

validation:
  nav:
    omitted_files: ignore
  links:
    not_found: warn
    absolute_links: relative_to_docs

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
      - guides/chat-basics.md
      - guides/yaml-and-assets.md
      - guides/fillings.md
      - guides/utensils.md
  - Examples:
      - examples/index.md
      - examples/prompt-recipes.md
  - API Reference:
      - reference/index.md
      - Chat: reference/api/chat.md
      - Text: reference/api/text.md
      - Utensils: reference/api/utensils.md
      - Packs: reference/api/packs.md
  - Philosophy: philosophy.md
  - Contributor Docs: contributor-docs.md
