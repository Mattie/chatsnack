name: Publish package

on:
  release:
    types: [published]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    # The build job uploads package distributions for later publish jobs.
    # Keep artifact write access out of the OIDC-enabled publish jobs.
    permissions:
      contents: read
      actions: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            poetry.lock

      - name: Build and check distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v6
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/chatsnack/
    # Read the checked package artifacts and mint an OIDC token for TestPyPI.
    # Do not grant artifact write access in the publish job.
    permissions:
      actions: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  verify-testpypi:
    name: Verify TestPyPI install
    needs: publish-testpypi
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install from TestPyPI
        shell: bash
        run: |
          python -m pip install --upgrade pip
          version="${GITHUB_REF_NAME#v}"
          for attempt in 1 2 3 4 5; do
            python -m pip install \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              "chatsnack==${version}" && break
            if [ "${attempt}" = "5" ]; then
              exit 1
            fi
            sleep 15
          done

      - name: Run import smoke test
        run: python -c "import chatsnack; from chatsnack import Chat, Text"

  publish-pypi:
    name: Publish to PyPI
    needs: verify-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/chatsnack/
    # Read the checked package artifacts and mint an OIDC token for PyPI.
    # The pypi environment supplies the required manual approval gate.
    permissions:
      actions: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
