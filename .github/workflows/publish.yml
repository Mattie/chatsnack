name: Publish package

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: Package index to publish to
        required: true
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event_name == 'workflow_dispatch' && inputs.target || 'pypi' }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate-target:
    name: Validate publish target
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Reject production publish from non-release refs
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'pypi' && github.ref != 'refs/heads/master' && !startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "::error::PyPI publishing is restricted to master or v* tags. Current ref is $GITHUB_REF."
          exit 1

      - name: Confirm publish target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target="${{ inputs.target }}"
          else
            target="pypi"
          fi
          echo "Publishing target '$target' from ref '${{ github.ref }}'."

  build:
    name: Build distributions
    needs: validate-target
    runs-on: ubuntu-latest
    # The build job uploads package distributions for a later publish job.
    # Keep artifact write access out of the OIDC-enabled publish jobs.
    permissions:
      contents: read
      actions: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            poetry.lock

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/chatsnack/
    # Read the checked package artifacts and mint an OIDC token for TestPyPI.
    # Do not grant artifact write access in the publish job.
    permissions:
      actions: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    # Defense in depth: validate-target fails invalid refs before build, and
    # this condition prevents production upload if the dependency graph changes.
    if: (github.event_name == 'push' || inputs.target == 'pypi') && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/chatsnack/
    # Read the checked package artifacts and mint an OIDC token for PyPI.
    # The pypi environment supplies the required manual approval gate.
    permissions:
      actions: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
